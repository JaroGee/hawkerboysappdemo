const LS_KEY = 'hb_v1';

const DEFAULT_STATE = {
  xp: 340, xpMax: 500, level: 2, streak: 7,
  lastActiveDate: null,
  stage: 1,
  stageProgress: { 1: 0.65, 2: 0, 3: 0, 4: 0 },

    'First Day': true, '7 Streak': true, 'Certified': true, '300 XP': true,
    'Placed': false, 'First $1K': false, 'Owner': false, 'Mentor': false
  }
};

function loadState() {
  try {
    const s = localStorage.getItem(LS_KEY);
    return s ? { ...DEFAULT_STATE, ...JSON.parse(s) } : { ...DEFAULT_STATE };
  } catch { return { ...DEFAULT_STATE }; }
}

function saveState(s) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(s)); } catch {}
}

function isToolUnlocked(toolId, state) {
  return true;
  const { stage, stageProgress } = state;
  const p1 = stageProgress[1] || 0;
  switch(toolId) {
    case 'ai': return true;
    case 'culinary': return p1 >= 0.5;
    case 'cost': return p1 >= 1.0;
    case 'stalls': return stage >= 2;
    case 'tender': return stage >= 2;
    case 'ops': return stage >= 3;
    case 'tips': return stage >= 3;
    case 'biz': return stage >= 4;
    default: return false;
  }
}

function toolUnlockRequirement(toolId) {
  switch(toolId) {
    case 'culinary': return 'Stage 1: 50% progress';
    case 'cost': return 'Stage 1: Complete';
    case 'stalls': return 'Stage 2';
    case 'tender': return 'Stage 2';
    case 'ops': return 'Stage 3';
    case 'tips': return 'Stage 3';
    case 'biz': return 'Stage 4';
    default: return 'Locked';
  }
}

function stateReducer(state, action) {
  let next;
  switch(action.type) {
    case 'ADD_XP':
      next = { ...state, xp: state.xp + action.amount };
      break;
    case 'SET_TAB':
      return state;
    case 'SAVE_API_KEY':
      next = { ...state, apiKey: action.key };
      break;
    case 'SET_STAGE_PROGRESS': {
      const sp = { ...state.stageProgress, [action.stage]: action.progress };
      next = { ...state, stageProgress: sp };
      break;
    }
    case 'COMPLETE_STAGE': {
      const s = action.stage;
      const sp = { ...state.stageProgress, [s]: 1.0 };
      const newStage = Math.max(state.stage, s + 1);
      const tools = [...state.unlockedTools];
      if (s >= 1 && !tools.includes('cost')) tools.push('cost');
      if (s >= 1 && !tools.includes('stalls')) tools.push('stalls');
      if (s >= 1 && !tools.includes('tender')) tools.push('tender');
      if (s >= 2 && !tools.includes('ops')) tools.push('ops');
      if (s >= 2 && !tools.includes('tips')) tools.push('tips');
      if (s >= 3 && !tools.includes('biz')) tools.push('biz');
      next = { ...state, stageProgress: sp, stage: Math.min(newStage, 4), unlockedTools: tools, xp: state.xp + 100 };
      break;
    }
    default: return state;
  }
  saveState(next);
  return next;
}

};

function findCanned(t) {
  t = t.toLowerCase();
  if (t.includes('cost')||t.includes('ingredient')) return CANNED.cost;
  if (t.includes('supplier')||t.includes('message')||t.includes('order')) return CANNED.supplier;
  if (t.includes('sop')||t.includes('opening')||t.includes('checklist')) return CANNED.sop;
  if (t.includes('price')||t.includes('pricing')||t.includes('sell')) return CANNED.price;
  if (t.includes('customer')||t.includes('complaint')) return CANNED.customer;
  if (t.includes('revenue')||t.includes('track')||t.includes('daily')) return CANNED.revenue;
  return CANNED.default;
}

async function callClaude(userText, apiKey, stage) {
  const res = await fetch('https://hawkr-proxy.jaromelgee.workers.dev', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 600,
      system: SYSTEM_PROMPTS[stage] || SYSTEM_PROMPTS[1],
      messages: [{ role: 'user', content: userText }]
    })
  });
  if (!res.ok) throw new Error('API error ' + res.status);
  const d = await res.json();
  return d.content[0].text;
}

// ─── Quiz Component ──────────────────────────────────────────────────────────
function QuizComponent({ onXPEarned, onBack }) {
  const [phase, setPhase] = useState('quiz'); // quiz | results
  const [idx, setIdx] = useState(0);
  const [score, setScore] = useState(0);
  const [answered, setAnswered] = useState(null);
  const [xpEarned, setXpEarned] = useState(0);
  const LTRS = ['A','B','C'];

  const q = QUIZ[idx];

  function pickAns(chosen) {
    if (answered !== null) return;
    setAnswered(chosen);
    const correct = chosen === q.ans;
    if (correct) {
      setScore(s => s+1);
      setXpEarned(x => x+15);
    }
  }

  function nextQ() {
    if (idx >= QUIZ.length - 1) {
      const total = xpEarned + 50;
      setXpEarned(total);
      onXPEarned(total);
      setPhase('results');
    } else {
      setIdx(i => i+1);
      setAnswered(null);
    }
  }

  if (phase === 'results') {
    const s = score, t = QUIZ.length;
    const [quizIcon,title] = s>=9?[<IconTrophy size={52} color="var(--gold)"/>,'HAWKER MASTER!']:s>=7?[<IconParty size={52} color="var(--magenta)"/>,'EXCELLENT WORK!']:s>=5?[<IconStar size={52} color="var(--cyan)"/>,'GOOD EFFORT!']:[<IconBookOpen size={52} color="var(--grey)"/>,'KEEP LEARNING!'];
    return (
      <div style={{padding:'20px 20px 10px',textAlign:'center'}}>
        <div style={{marginBottom:10,display:'flex',justifyContent:'center'}}>{quizIcon}</div>
        <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:9,color:'var(--white)',lineHeight:1.9,marginBottom:16}}>{title}</div>
        <div style={{fontSize:52,fontWeight:800,color:'var(--cyan)',lineHeight:1}}>{s}/{t}</div>
        <div style={{fontSize:13,color:'var(--grey)',marginBottom:16}}>Correct answers</div>
        <div style={{display:'inline-flex',alignItems:'center',gap:5,padding:'10px 22px',borderRadius:24,background:'rgba(255,214,0,0.1)',border:'1px solid rgba(255,214,0,0.25)',fontSize:17,fontWeight:800,color:'var(--gold)',marginBottom:22}}>+{xpEarned} XP Earned</div>
        <button onClick={()=>{setPhase('quiz');setIdx(0);setScore(0);setAnswered(null);setXpEarned(0);}} style={{width:'100%',padding:'13px',background:'var(--cyan)',color:'#04080f',border:'none',borderRadius:12,fontSize:13,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',cursor:'pointer',marginBottom:8}}>Play Again</button>
        <button onClick={onBack} style={{width:'100%',padding:'12px',background:'transparent',color:'var(--grey)',border:'1px solid var(--border)',borderRadius:12,fontSize:12,fontWeight:600,cursor:'pointer'}}>Back</button>
      </div>
    );
  }

  return (
    <div>
      {/* Progress bar */}
      <div style={{padding:'12px 20px',display:'flex',alignItems:'center',gap:10}}>
        <button onClick={onBack} style={{width:32,height:32,borderRadius:'50%',background:'var(--card)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:13,color:'var(--white)',flexShrink:0}}>←</button>
        <div style={{flex:1}}>
          <div style={{fontSize:9,color:'var(--grey)',textAlign:'right',marginBottom:4}}>Question {idx+1} of {QUIZ.length}</div>
          <PbarTrack pct={(idx+1)/QUIZ.length}/>
        </div>
        <div style={{padding:'4px 11px',background:'rgba(0,230,118,0.1)',border:'1px solid rgba(0,230,118,0.2)',borderRadius:20,fontSize:11,fontWeight:700,color:'var(--green)'}}>{score} / {idx}</div>
      </div>
      {/* Question */}
      <div style={{margin:'6px 16px 0',background:'var(--card)',border:'1px solid var(--border)',borderRadius:16,padding:'18px 16px'}}>
        <div style={{fontSize:9,fontWeight:700,color:'var(--cyan)',letterSpacing:'0.15em',textTransform:'uppercase',marginBottom:10}}>QUESTION {String(idx+1).padStart(2,'0')}</div>
        <div style={{fontSize:15,fontWeight:600,color:'var(--white)',lineHeight:1.5}}>{q.q}</div>
      </div>
      {/* Options */}
      <div style={{padding:'8px 16px 0',display:'flex',flexDirection:'column',gap:7}}>
        {q.opts.map((opt,i) => {
          let cls = '';
          if (answered !== null) {
            if (i === q.ans) cls = 'correct';
            else if (i === answered) cls = 'wrong';
          }
          return (
            <button key={i} disabled={answered!==null} onClick={()=>pickAns(i)}
              style={{
                width:'100%',padding:'12px 14px',background:cls==='correct'?'rgba(0,230,118,0.08)':cls==='wrong'?'rgba(255,71,87,0.08)':'var(--card)',
                border:`1.5px solid ${cls==='correct'?'var(--green)':cls==='wrong'?'var(--red)':'var(--border)'}`,
                borderRadius:12,display:'flex',alignItems:'center',gap:10,cursor:answered!==null?'default':'pointer',textAlign:'left'
              }}>
              <div style={{width:28,height:28,borderRadius:8,background:cls==='correct'?'var(--green)':cls==='wrong'?'var(--red)':'var(--gdim)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:cls?'#fff':'var(--white)',flexShrink:0}}>{LTRS[i]}</div>
              <span style={{fontSize:13,color:'var(--white)',flex:1,lineHeight:1.4}}>{opt}</span>
            </button>
          );
        })}
      </div>
      {/* Fact */}
      {answered !== null && (
        <div style={{margin:'8px 16px 0',background:'rgba(0,245,255,0.06)',border:'1px solid rgba(0,245,255,0.14)',borderRadius:12,padding:'11px 13px',fontSize:11,color:'var(--grey)',lineHeight:1.6}}>
          <strong style={{color:'var(--cyan)',display:'inline-flex',alignItems:'center',gap:4}}><IconLightbulb size={13} color="var(--cyan)"/> Did you know?</strong> {q.fact}
        </div>
      )}
      {answered !== null && (
        <button onClick={nextQ} style={{margin:'10px 16px 0',width:'calc(100% - 32px)',padding:13,background:'var(--cyan)',color:'#04080f',border:'none',borderRadius:12,fontSize:13,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',cursor:'pointer',display:'block'}}>
          {idx >= QUIZ.length-1 ? 'See Results →' : 'Next Question →'}
        </button>
      )}
    </div>
  );
}

// ─── COST ENGINE ─────────────────────────────────────────────────────────────
function calcCosts(f) {
  const rev = f.covers * f.avgSpend * f.daysPerWeek * 4.33;
  const labour = f.staff * 1800 * 1.17;
  const scc = f.rent * 0.15;
  const utilities = 400 + (f.hoursPerDay * f.daysPerWeek * 4.33 * 8);
  const cogs = rev * (f.foodCostPct / 100);
  const packaging = f.covers * f.daysPerWeek * 4.33 * 0.30;
  const total = f.rent + scc + 150 + utilities + labour + cogs + packaging;
  return { rev, labour, scc, utilities, cogs, packaging, total, fixed: f.rent + scc + 150 + utilities + labour + packaging };
}

function CostEngine() {
  const [form, setForm] = useState({rent:2000,hoursPerDay:12,daysPerWeek:6,staff:1,foodCostPct:30,covers:80,avgSpend:5.50,cuisine:'Chinese',centreName:''});
  const [res, setRes] = useState(null);
  const [proj, setProj] = useState(null);
  const up = (k,v) => setForm(p=>({...p,[k]:v}));
  const fmt = v => `$${Math.round(v).toLocaleString()}`;

  const calc = () => {
    const f = {...form,rent:+form.rent,hoursPerDay:+form.hoursPerDay,daysPerWeek:+form.daysPerWeek,staff:+form.staff,foodCostPct:+form.foodCostPct,covers:+form.covers,avgSpend:+form.avgSpend};
    setRes({...calcCosts(f),f});
    const amr = f.rent * 0.7;
    setProj([1,2,3,4,5,6,7].map(y=>{
      const rent = y<=3?f.rent:y<=6?f.rent-(f.rent-amr)*0.5:amr;
      const c = calcCosts({...f,rent});
      return {year:`Yr ${y}`,profit70:c.rev*0.7-(c.fixed+c.rev*0.7*(f.foodCostPct/100)),profit100:c.rev-c.total,profit130:c.rev*1.3-(c.fixed+c.rev*1.3*(f.foodCostPct/100))};
    }));
  };

  const inp = "border border-gray-200 rounded-lg px-3 py-2 w-full text-sm outline-none focus:ring-2 focus:ring-orange-400 bg-white";
  return (
    <div className="p-4 space-y-4" style={{fontFamily:'DM Sans,sans-serif'}}>
      <LCard>
        <h2 className="font-bold text-base mb-3">Stall Configuration</h2>
        <div className="space-y-3">
          <div><label className="block text-xs font-medium text-gray-600 mb-1">Hawker Centre</label><input value={form.centreName} onChange={e=>up('centreName',e.target.value)} placeholder="e.g. Tiong Bahru Market" className={inp}/></div>
          <div><label className="block text-xs font-medium text-gray-600 mb-1">Cuisine</label>
            <select value={form.cuisine} onChange={e=>up('cuisine',e.target.value)} className={inp+" bg-white"}>{['Chinese','Malay','Indian','Western','Mixed'].map(c=><option key={c}>{c}</option>)}</select>
          </div>
          <div><label className="block text-xs font-medium text-gray-600 mb-1">Tendered Rent (SGD/mo)</label><input type="number" value={form.rent} onChange={e=>up('rent',e.target.value)} className={inp}/></div>
          <div className="grid grid-cols-2 gap-2">
            <div><label className="block text-xs font-medium text-gray-600 mb-1">Hours/Day</label><input type="number" value={form.hoursPerDay} onChange={e=>up('hoursPerDay',e.target.value)} min="1" max="24" className={inp}/></div>
            <div><label className="block text-xs font-medium text-gray-600 mb-1">Days/Week</label><input type="number" value={form.daysPerWeek} onChange={e=>up('daysPerWeek',e.target.value)} min="1" max="7" className={inp}/></div>
          </div>
          <div><label className="block text-xs font-medium text-gray-600 mb-1">Staff (0 = solo)</label><input type="number" value={form.staff} onChange={e=>up('staff',e.target.value)} min="0" className={inp}/></div>
          <div className="grid grid-cols-2 gap-2">
            <div><label className="block text-xs font-medium text-gray-600 mb-1">Food Cost %</label><input type="number" value={form.foodCostPct} onChange={e=>up('foodCostPct',e.target.value)} className={inp}/></div>
            <div><label className="block text-xs font-medium text-gray-600 mb-1">Avg Spend ($)</label><input type="number" step="0.5" value={form.avgSpend} onChange={e=>up('avgSpend',e.target.value)} className={inp}/></div>
          </div>
          <div><label className="block text-xs font-medium text-gray-600 mb-1">Daily Covers</label><input type="number" value={form.covers} onChange={e=>up('covers',e.target.value)} className={inp}/></div>
          <button onClick={calc} className="w-full bg-orange-500 text-white py-2.5 rounded-xl font-semibold text-sm hover:bg-orange-600 transition-colors">Calculate Breakdown</button>
        </div>
      </LCard>

      {res && (
        <LCard>
          <h2 className="font-bold text-base mb-3">Monthly Breakdown</h2>
          <div className="space-y-1.5">
            {[['Tendered Rent',res.f.rent],['S&CC (~15%)',res.scc],['Table Cleaning',150],['Utilities',res.utilities],['Labour (incl. CPF 17%)',res.labour],['Ingredients / COGS',res.cogs],['Packaging',res.packaging]].map(([l,v])=>(
              <div key={l} className="flex justify-between py-1 border-b border-gray-50 text-sm">
                <span className="text-gray-600">{l}</span>
                <span className="font-mono font-medium text-orange-600">{fmt(v)}</span>
              </div>
            ))}
            <div className="flex justify-between pt-2"><span className="font-bold text-sm">Total Monthly Costs</span><span className="font-mono font-bold">{fmt(res.total)}</span></div>
            <div className="flex justify-between text-sm text-gray-500"><span>Monthly Revenue</span><span className="font-mono">{fmt(res.rev)}</span></div>
            <div className={`flex justify-between text-sm font-semibold ${res.rev-res.total>=0?'text-teal-600':'text-red-500'}`}>
              <span>Net Profit/Loss</span><span className="font-mono">{res.rev-res.total>=0?'+':''}{fmt(res.rev-res.total)}</span>
            </div>
          </div>
        </LCard>
      )}

      {res && (
        <LCard>
          <h2 className="font-bold text-base mb-2">Revenue Scenarios</h2>
          <div className="grid grid-cols-3 gap-2">
            {[{label:'70% Rev',mult:0.7,cls:'bg-red-50 border-red-100'},{label:'100% Rev',mult:1,cls:'bg-teal-50 border-teal-100'},{label:'130% Rev',mult:1.3,cls:'bg-green-50 border-green-100'}].map(s=>{
              const rev = res.rev*s.mult;
              const profit = rev-(res.fixed+rev*(res.f.foodCostPct/100));
              return <div key={s.label} className={`rounded-xl p-2 border ${s.cls} text-center`}>
                <div className="text-xs text-gray-500 mb-0.5">{s.label}</div>
                <div className="font-mono text-xs font-bold">{fmt(rev)}</div>
                <div className={`font-mono text-xs font-semibold ${profit>=0?'text-teal-600':'text-red-500'}`}>{profit>=0?'+':''}{fmt(profit)}</div>
              </div>;
            })}
          </div>
        </LCard>
      )}

      {proj && (
        <LCard>
          <h2 className="font-bold text-base mb-3">6-Year Projection</h2>
          <div style={{height:200}}>
            <ResponsiveContainer width="100%" height="100%">
              <LineChart data={proj}>
                <CartesianGrid strokeDasharray="3 3" stroke="#f0f0f0"/>
                <XAxis dataKey="year" tick={{fontSize:10}}/>
                <YAxis tick={{fontSize:9}} tickFormatter={v=>`$${(v/1000).toFixed(0)}k`}/>
                <Tooltip formatter={(v,n)=>[`$${Math.round(v).toLocaleString()}`,n]}/>
                <Legend wrapperStyle={{fontSize:10}}/>
                <Line type="monotone" dataKey="profit70" stroke="#EF4444" name="@70%" strokeWidth={2} dot={false}/>
                <Line type="monotone" dataKey="profit100" stroke="#0E7C7B" name="@100%" strokeWidth={2.5} dot={false}/>
                <Line type="monotone" dataKey="profit130" stroke="#C9993A" name="@130%" strokeWidth={2} dot={false}/>
              </LineChart>
            </ResponsiveContainer>
          </div>
          <p className="text-xs text-gray-400 mt-2">Yr 4–6: rent steps toward AMR. Yr 7: full AMR.</p>
        </LCard>
      )}
    </div>
  );
}

// ─── INSIDER TIPS MODULE ─────────────────────────────────────────────────────
function InsiderModule() {
  const [cat, setCat] = useState('All');
  const cats = ['All','Tender Tricks','Ops Survival','Cost Traps','Scaling Up'];
  const filtered = cat==='All'?TIPS:TIPS.filter(t=>t.cat===cat);
  const catCol = {'Tender Tricks':'ember','Ops Survival':'teal','Cost Traps':'gold','Scaling Up':'green'};

  return (
    <div className="p-4 space-y-3" style={{fontFamily:'DM Sans,sans-serif'}}>
      <div className="flex gap-2 flex-wrap">
        {cats.map(c=><button key={c} onClick={()=>setCat(c)} className={`px-3 py-1.5 rounded-full text-xs font-medium transition-colors ${cat===c?'bg-orange-500 text-white':'bg-white text-gray-600 border border-gray-200'}`}>{c} ({c==='All'?TIPS.length:TIPS.filter(t=>t.cat===c).length})</button>)}
      </div>
      <div className="space-y-3">
        {filtered.map(t=>(
          <LCard key={t.id} cls="!p-4">
            <div className="flex items-start justify-between gap-2 mb-1"><h3 className="font-semibold text-sm">{t.title}</h3><LBadge col={catCol[t.cat]||'gray'}>{t.cat}</LBadge></div>
            <p className="text-xs text-gray-600 leading-relaxed">{t.body}</p>
          </LCard>
        ))}
      </div>
    </div>
  );
}

// ─── BUSINESS MODULE ─────────────────────────────────────────────────────────

              {label:'Sell',val:`$${sel.sellAt.toFixed(2)}`,col:'#111'},
              {label:'Margin',val:`${margin(sel)}%`,col:'#0d9488'},

              <div key={s.label} style={{background:'#f9fafb',borderRadius:10,padding:'8px 4px',textAlign:'center'}}>

                  {p===1?'×1':p+'×'}

              ))}
            </div>
          </div>

          {/* Ingredients */}
          <div style={{background:'#fff',border:'1px solid #e5e7eb',borderRadius:12,overflow:'hidden'}}>

                <div style={{flex:1}}>
                  <div style={{fontSize:12,color:'#374151'}}>{ing.item}</div>
                  {ing.notes && <div style={{fontSize:10,color:'#9ca3af',marginTop:1}}>{ing.notes}</div>}
                </div>
              </div>
            ))}
          </div>

          {/* Method */}
          <div style={{background:'#fff',border:'1px solid #e5e7eb',borderRadius:12,overflow:'hidden'}}>
            <div style={{padding:'10px 14px',background:'#fafafa',borderBottom:'1px solid #e5e7eb',fontSize:11,fontWeight:700,color:'#374151',letterSpacing:'0.06em'}}>METHOD</div>
            {sel.method.map((step,i)=>(
              <div key={i} style={{padding:'10px 14px',borderBottom:i<sel.method.length-1?'1px solid #f3f4f6':'none',display:'flex',gap:10}}>

                <div style={{fontSize:12,color:'#374151',lineHeight:1.6}}>{step}</div>
              </div>
            ))}
          </div>

          {/* Chef tips */}
          <div style={{background:'#fffbeb',border:'1px solid #fde68a',borderRadius:12,overflow:'hidden'}}>
            <div style={{padding:'10px 14px',borderBottom:'1px solid #fde68a',fontSize:11,fontWeight:700,color:'#92400e',letterSpacing:'0.06em'}}>CHEF TIPS</div>
            {sel.tips.map((tip,i)=>(
              <div key={i} style={{padding:'8px 14px',borderBottom:i<sel.tips.length-1?'1px solid #fef3c7':'none',fontSize:12,color:'#78350f',lineHeight:1.6,display:'flex',gap:8}}>
                <span style={{flexShrink:0}}>★</span><span>{tip}</span>
              </div>
            ))}
          </div>

          {/* Scale guide */}
          <div style={{background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:12,overflow:'hidden'}}>
            <div style={{padding:'10px 14px',borderBottom:'1px solid #bfdbfe',fontSize:11,fontWeight:700,color:'#1e40af',letterSpacing:'0.06em'}}>HAWKER SCALE GUIDE</div>

              <div key={k} style={{padding:'8px 14px',borderBottom:'1px solid #dbeafe',display:'flex',gap:10,alignItems:'baseline'}}>
                <span style={{fontSize:11,fontWeight:700,color:'#1d4ed8',minWidth:36}}>{k}×</span>
                <span style={{fontSize:12,color:'#374151'}}>{v}</span>
              </div>
            ))}
          </div>

          {/* Common mistakes */}
          <div style={{background:'#fff1f2',border:'1px solid #fecdd3',borderRadius:12,overflow:'hidden'}}>
            <div style={{padding:'10px 14px',borderBottom:'1px solid #fecdd3',fontSize:11,fontWeight:700,color:'#9f1239',letterSpacing:'0.06em'}}>COMMON MISTAKES</div>
            {sel.commonMistakes.map((m,i)=>(
              <div key={i} style={{padding:'8px 14px',borderBottom:i<sel.commonMistakes.length-1?'1px solid #ffe4e6':'none',fontSize:12,color:'#881337',display:'flex',gap:8}}>
                <span style={{flexShrink:0}}>✗</span><span>{m}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{fontFamily:'DM Sans,sans-serif'}}>
      <div className="p-4 space-y-3">
        {/* Search */}
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search dishes or tags..." className="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm outline-none bg-white"/>

        {/* Cuisine filter */}
        <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:2}}>
          {cuisines.map(c=>(
            <button key={c} onClick={()=>setFilterCuisine(c)} style={{flexShrink:0,padding:'5px 12px',borderRadius:20,border:`1.5px solid ${filterCuisine===c?'#111':'#e5e7eb'}`,background:filterCuisine===c?'#111':'#fff',color:filterCuisine===c?'#fff':'#374151',fontSize:11,fontWeight:600,cursor:'pointer'}}>
              {c}
            </button>
          ))}
        </div>

        {/* Category filter */}
        <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:2}}>

// ─── AI SCREEN ───────────────────────────────────────────────────────────────
function AIScreen({ state, dispatch }) {
  const [msgs, setMsgs] = useState([
    { role:'ai', text:`Hey ${state.userName}! I'm your Hawker AI assistant.\n\nAsk me anything about your stall — costing, supplier messages, SOPs, pricing, admin templates. What do you need?` }
  ]);
  const [input, setInput] = useState('');
  const [typing, setTyping] = useState(false);
  const bottomRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({behavior:'smooth'}); }, [msgs, typing]);

  const CHIPS = ['Cost a dish','Supplier message','Opening SOP','Price my menu','Customer complaint','Track revenue'];

  async function send(text) {
    const q = text || input.trim();
    if (!q || typing) return;
    setInput('');
    setMsgs(m => [...m, {role:'user', text:q}]);
    setTyping(true);
    try {
      let reply;
      try { reply = await callClaude(q, state.apiKey, state.stage); }
      catch(e) {
        await new Promise(r=>setTimeout(r,600));
        reply = findCanned(q);
      }
      setMsgs(m => [...m, {role:'ai', text:reply}]);
    } catch(e) {
      setMsgs(m => [...m, {role:'ai', text:'Something went wrong. Try again.'}]);
    }
    setTyping(false);
    inputRef.current?.focus();
  }

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      <div style={{padding:'14px 20px 0',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
        <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:9,color:'var(--white)'}}>HAWKER AI</div>
        <div style={{display:'flex',alignItems:'center',gap:6,padding:'4px 10px',background:'rgba(0,230,118,0.08)',border:'1px solid rgba(0,230,118,0.18)',borderRadius:20}}>
          <div style={{width:6,height:6,borderRadius:'50%',background:'var(--green)',boxShadow:'0 0 6px var(--green)',animation:'pulse 2s infinite'}}/>
          <span style={{fontSize:9,fontWeight:700,color:'var(--green)'}}>{'Live'}</span>
        </div>
      </div>
      {/* Stage context */}
      <div style={{padding:'6px 16px 0',flexShrink:0}}>
        <div style={{fontSize:10,color:'var(--grey)',padding:'4px 10px',background:'rgba(0,245,255,0.04)',border:'1px solid rgba(0,245,255,0.1)',borderRadius:10,display:'inline-block'}}>
          Stage {state.stage} mode — {['Training mentor','Business coach','Business advisor','HAWKR.AI'][state.stage-1]}
        </div>
      </div>
      {/* Quick chips */}
      <div style={{display:'flex',gap:7,padding:'10px 16px 0',overflowX:'auto',flexShrink:0,scrollbarWidth:'none'}}>
        {CHIPS.map(c=>(
          <div key={c} onClick={()=>send(c)} style={{padding:'7px 12px',background:'rgba(0,245,255,0.07)',border:'1px solid rgba(0,245,255,0.18)',borderRadius:20,fontSize:11,fontWeight:600,color:'var(--cyan)',whiteSpace:'nowrap',cursor:'pointer',flexShrink:0}}>
            {c}
          </div>
        ))}
      </div>
      {/* Messages */}
      <div style={{flex:1,overflowY:'auto',padding:'12px 16px 8px',display:'flex',flexDirection:'column',gap:10,minHeight:0}} className="dark-scroll">
        {msgs.map((m,i) => m.role === 'ai' ? (
          <div key={i} style={{display:'flex',alignItems:'flex-end',gap:8}}>
            <div style={{width:28,height:28,borderRadius:'50%',flexShrink:0,background:'linear-gradient(135deg,rgba(0,245,255,0.2),rgba(0,80,100,0.3))',border:'1px solid rgba(0,245,255,0.25)',display:'flex',alignItems:'center',justifyContent:'center'}}><IconSparkle size={14} color="var(--cyan)"/></div>
            <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:'14px 14px 14px 4px',padding:'11px 13px',fontSize:12,color:'var(--white)',lineHeight:1.65,maxWidth:'78%',whiteSpace:'pre-line'}}>{m.text}</div>
          </div>
        ) : (
          <div key={i} style={{display:'flex',justifyContent:'flex-end'}}>
            <div style={{background:'linear-gradient(135deg,rgba(0,245,255,0.15),rgba(0,100,140,0.1))',border:'1px solid rgba(0,245,255,0.2)',borderRadius:'14px 14px 4px 14px',padding:'10px 13px',fontSize:12,color:'var(--white)',lineHeight:1.5,maxWidth:'72%'}}>{m.text}</div>
          </div>
        ))}
        {typing && (
          <div style={{display:'flex',alignItems:'flex-end',gap:8}}>
            <div style={{width:28,height:28,borderRadius:'50%',flexShrink:0,background:'linear-gradient(135deg,rgba(0,245,255,0.2),rgba(0,80,100,0.3))',border:'1px solid rgba(0,245,255,0.25)',display:'flex',alignItems:'center',justifyContent:'center'}}><IconSparkle size={14} color="var(--cyan)"/></div>
            <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:'14px 14px 14px 4px',padding:'12px 14px',display:'flex',gap:4,alignItems:'center'}}>
              {[0,0.2,0.4].map((d,i)=><div key={i} style={{width:5,height:5,borderRadius:'50%',background:'var(--grey)',animation:`typingBounce 1.2s ${d}s infinite`}}/>)}

        )}
        <div ref={bottomRef}/>

      {/* Input */}
      <div style={{padding:'10px 16px 12px',background:'rgba(6,10,20,0.98)',borderTop:'1px solid var(--border)',display:'flex',gap:8,alignItems:'center',flexShrink:0}}>

// ─── PROFILE SCREEN ──────────────────────────────────────────────────────────
function ProfileScreen({ state, dispatch }) {
  const [keyInput, setKeyInput] = useState(state.apiKey || '');
  const [keyStatus, setKeyStatus] = useState('');
  const xpPct = Math.min(state.xp / state.xpMax, 1);

  const BADGE_DEF = [
    {key:'First Day',  icon:<IconTarget size={20} color="var(--cyan)"/>},
    {key:'7 Streak',   icon:<IconFlame size={20} color="var(--magenta)"/>},
    {key:'Certified',  icon:<IconScroll size={20} color="var(--gold)"/>},
    {key:'300 XP',     icon:<IconStar size={20} color="var(--gold)"/>},
    {key:'Placed',     icon:<IconStall size={20} color="var(--cyan)"/>},
    {key:'First $1K',  icon:<IconCoins size={20} color="var(--green)"/>},
    {key:'Owner',      icon:<IconTrophy size={20} color="var(--gold)"/>},
    {key:'Mentor',     icon:<IconGlobe size={20} color="var(--magenta)"/>},
  ];

  function onKeyChange(val) {
    setKeyInput(val);
    if (val.startsWith('sk-ant-') && val.length > 20) {
      setKeyStatus('✓ Key saved');
      dispatch({ type:'SAVE_API_KEY', key:val });
    } else if (val.length > 0) {
      setKeyStatus('Key looks incomplete (should start with sk-ant-)');
    } else {
      setKeyStatus('');
      dispatch({ type:'SAVE_API_KEY', key:'' });
    }
  }

  return (
    <div style={{overflowY:'auto',height:'100%'}} className="dark-scroll">
      <div style={{padding:'14px 20px 4px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:9,color:'var(--white)'}}>PROFILE</div>
        <span style={{cursor:'pointer',display:'flex',color:'var(--grey)'}}><IconGear size={18} color="var(--grey)"/></span>
      </div>
      {/* Avatar */}
      <div style={{padding:'14px 20px',display:'flex',alignItems:'center',gap:14}}>
        <div style={{width:64,height:64,borderRadius:'50%',background:'linear-gradient(135deg,#0a4060,#003040)',border:'3px solid var(--cyan)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 0 22px rgba(0,245,255,0.22)'}}><IconChefHat size={30} color="var(--cyan)"/></div>
        <div>
          <div style={{fontSize:17,fontWeight:700,color:'var(--white)',marginBottom:2}}>{state.userName}</div>
          <div style={{fontSize:11,color:'var(--grey)',marginBottom:7}}>Cohort 6 · Batch B · {['Training','Placement','Aftercare','Ownership'][state.stage-1]}</div>
          <div style={{fontSize:11,fontWeight:700,color:'var(--cyan)'}}>Level {state.level} — {['Novice','Trainee','Operator','Owner'][state.level-1]||'Trainee'}</div>
        </div>
      </div>
      {/* XP */}
      <div style={{margin:'0 16px',background:'linear-gradient(135deg,rgba(0,245,255,0.06),rgba(0,80,120,0.04))',border:'1px solid rgba(0,245,255,0.14)',borderRadius:14,padding:'14px 16px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:7}}>
          <span style={{fontSize:10,color:'var(--grey)',textTransform:'uppercase',letterSpacing:'0.1em'}}>Level Progress</span>
          <span style={{fontSize:11,fontWeight:700,color:'var(--cyan)'}}>{state.xp} / {state.xpMax} XP</span>
        </div>
        <PbarTrack pct={xpPct} color="linear-gradient(90deg,#00f5ff,#00c8d4)"/>
        <div style={{marginTop:7,fontSize:10,color:'var(--grey)'}}>{state.xpMax-state.xp} XP to Level {state.level+1}</div>
      </div>
      {/* Badges */}
      <div style={{margin:'10px 16px 0',background:'var(--card)',border:'1px solid var(--border)',borderRadius:16,padding:16}}>
        <div style={{fontSize:9,fontWeight:700,letterSpacing:'0.14em',textTransform:'uppercase',color:'var(--grey)',marginBottom:10}}>ACHIEVEMENTS</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:7}}>
          {BADGE_DEF.map(b=>{
            const earned = state.badges[b.key];
            return (
              <div key={b.key} style={{aspectRatio:'1',borderRadius:12,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4,border:`1.5px solid ${earned?'var(--border)':'rgba(30,45,69,0.5)'}`,background:earned?'var(--card)':'rgba(15,22,38,0.5)',opacity:earned?1:0.42}}>
                <span style={{display:'flex'}}>{b.icon}</span>
                <span style={{fontSize:7,fontWeight:600,color:earned?'var(--white)':'var(--grey)',textTransform:'uppercase',letterSpacing:'0.04em',textAlign:'center',lineHeight:1.2}}>{b.key}</span>
              </div>
            );
          })}
        </div>
      </div>
      {/* Stats */}
      <div style={{margin:'10px 16px 0',background:'var(--card)',border:'1px solid var(--border)',borderRadius:16,padding:16}}>
        <div style={{fontSize:9,fontWeight:700,letterSpacing:'0.14em',textTransform:'uppercase',color:'var(--grey)',marginBottom:10}}>YOUR STATS</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7}}>
          {[[state.xp,'var(--cyan)','Total XP'],[23,'var(--gold)','Days Active'],[state.streak,'var(--magenta)','Day Streak'],[Math.round((state.stageProgress[state.stage]||0)*100)+'%','var(--green)','Stage Done']].map(([val,color,lbl])=>(
            <div key={lbl} style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,padding:'12px 13px'}}>
              <div style={{fontSize:20,fontWeight:800,color}}>{val}</div>
              <div style={{fontSize:9,color:'var(--grey)',textTransform:'uppercase',letterSpacing:'0.08em',marginTop:2}}>{lbl}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{height:14}}/>
    </div>
  );
}

// ─── ROOT APP ────────────────────────────────────────────────────────────────
function App() {
  const [state, dispatch] = useReducer(stateReducer, null, loadState);
  const [tab, setTab] = useState('home');

  // Clock
  useEffect(() => {
    function tick() {
      const n = new Date();
      const el = document.getElementById('sTime');
      if (el) el.textContent = String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
    }
    tick();
    const id = setInterval(tick, 15000);
    return () => clearInterval(id);
  }, []);

  // Hide loading splash
  useEffect(() => {
    const splash = document.getElementById('loading-splash');
    if (splash) {
      setTimeout(() => splash.classList.add('hidden'), 200);
    }
  }, []);

  const NAV = [
    { id:'home',    label:'Home',    navIcon: (active) => <IconHome    size={22} color={active?'var(--cyan)':'var(--grey)'}/> },
    { id:'pathway', label:'Pathway', navIcon: (active) => <IconMap     size={22} color={active?'var(--cyan)':'var(--grey)'}/> },
    { id:'ai',      label:'AI',      navIcon: (active) => <IconSparkle size={22} color={active?'var(--cyan)':'var(--grey)'}/> },
    { id:'tools',   label:'Tools',   navIcon: (active) => <IconWrench  size={22} color={active?'var(--cyan)':'var(--grey)'}/> },
    { id:'profile', label:'Profile', navIcon: (active) => <IconPerson  size={22} color={active?'var(--cyan)':'var(--grey)'}/> },
  ];

  function renderScreen() {
    switch(tab) {
      case 'home':    return <HomeScreen state={state} dispatch={dispatch} setTab={setTab}/>;
      case 'pathway': return <PathwayScreen state={state} dispatch={dispatch}/>;
      case 'ai':      return <AIScreen state={state} dispatch={dispatch}/>;
      case 'tools':   return <ToolsScreen state={state}/>;
      case 'profile': return <ProfileScreen state={state} dispatch={dispatch}/>;
      default:        return <HomeScreen state={state} dispatch={dispatch} setTab={setTab}/>;
    }
  }

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',position:'relative'}}>
      {/* Screen area */}
      <div style={{flex:1,position:'relative',overflow:'hidden',minHeight:0}}>
        {renderScreen()}
      </div>
      {/* Bottom Nav */}
      <div style={{height:72,background:'rgba(6,10,20,0.97)',backdropFilter:'blur(20px)',borderTop:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-around',padding:'0 2px 12px',flexShrink:0,zIndex:30}}>
        {NAV.map(n=>(
          <button key={n.id} onClick={()=>setTab(n.id)} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'7px 10px',cursor:'pointer',border:'none',background:'none',borderRadius:12}}>
            <span style={{lineHeight:1,filter:tab===n.id?'drop-shadow(0 0 5px var(--cyan))':'none',display:'flex'}}>{n.navIcon(tab===n.id)}</span>
            <span style={{fontSize:8,fontWeight:600,color:tab===n.id?'var(--cyan)':'var(--grey)',letterSpacing:'0.05em',textTransform:'uppercase'}}>{n.label}</span>
          </button>
        ))}
      </div>
      <div style={{width:130,height:4,background:'rgba(255,255,255,0.18)',borderRadius:2,margin:'3px auto 5px',flexShrink:0}}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('react-root')).render(<App/>);
</script>
</body>
</html>
