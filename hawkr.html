// ─── AI Call ───────────────────────────────────────────────────────────────────
async function callHawkrAI(userMessages, contextNote = '') {
  const sys = `You are HAWKR.AI — Singapore's most knowledgeable hawker advisor. You have deep expertise in NEA tender mechanics, stall operations, Singapore F&B supply chains, local culinary tradition, and hawker business economics. Respond practically, with Singapore-specific context. Use local terminology naturally (AMR, SFA, CPF, MOM, kopitiams, NEA, S&CC). Be direct and specific with numbers.${contextNote ? '\n\n' + contextNote : ''}`;
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'anthropic-version': '2023-06-01', 'x-api-key': window.HAWKR_API_KEY || '' },
    body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: sys, messages: userMessages })
  });
  if (!res.ok) throw new Error('API error ' + res.status);
  const d = await res.json();
  return d.content[0].text;
}

// ─── Cost Engine ───────────────────────────────────────────────────────────────
function calcCosts(inputs) {
  const { rent, staff, hoursPerDay, daysPerWeek, foodCostPct, covers, avgSpend } = inputs;
  const monthlyRevenue = covers * avgSpend * daysPerWeek * 4.33;
  const labour = staff === 0 ? 0 : staff * 1800 * 1.17;
  const scc = rent * 0.15;
  const tableCleaning = 150;
  const utilities = 400 + (hoursPerDay * daysPerWeek * 4.33 * 8);
  const ingredients = monthlyRevenue * (foodCostPct / 100);
  const packaging = covers * daysPerWeek * 4.33 * 0.30;
  const total = rent + scc + tableCleaning + utilities + labour + ingredients + packaging;
  const breakEvenCovers4 = total / (4 * daysPerWeek * 4.33);
  const breakEvenCovers55 = total / (5.5 * daysPerWeek * 4.33);
  const breakEvenCovers7 = total / (7 * daysPerWeek * 4.33);
  return { monthlyRevenue, labour, scc, tableCleaning, utilities, ingredients, packaging, total, breakEvenCovers4, breakEvenCovers55, breakEvenCovers7 };
}

function buildProjection(rent, covers, avgSpend, daysPerWeek, foodCostPct, staff) {
  const amr = rent * 0.7;
  const rows = [];
  for (let y = 1; y <= 7; y++) {
    let r;
    if (y <= 3) r = rent;
    else if (y <= 6) r = rent - (rent - amr) * 0.5;
    else r = amr;
    const inputs = { rent: r, staff, hoursPerDay: 12, daysPerWeek, foodCostPct, covers, avgSpend };
    const c = calcCosts(inputs);
    const rev70 = c.monthlyRevenue * 0.7;
    const rev100 = c.monthlyRevenue;
    const rev130 = c.monthlyRevenue * 1.3;
    rows.push({
      year: `Yr ${y}`,
      rent: r,
      revenue: rev100,
      costs: c.total - c.ingredients,
      profit100: rev100 - c.total,
      profit70: rev70 - (c.total - c.ingredients + rev70 * (foodCostPct / 100)),
      profit130: rev130 - (c.total - c.ingredients + rev130 * (foodCostPct / 100)),
    });
  }
  return rows;
}
